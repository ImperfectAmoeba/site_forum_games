<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Conta - GameHelp Forum</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .main-editar {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            margin: 2rem auto;
        }
        .card-editar {
            background: white;
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(23, 55, 90, 0.15);
            border: 1px solid #d5e0f0;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #dde3ed;
            border-radius: 50px;
        }
        .btn-editar {
            width: 100%;
            background-color: #1e3b5c;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }
        .erro-mensagem {
            background: #ffe6e6;
            color: #a13030;
            padding: 0.8rem;
            border-radius: 50px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-container">
            <h1 class="logo"><a th:href="@{/}">GameHelp Forum</a></h1>
            <nav>
                <ul class="nav-links">
                    <li><a th:href="@{/}">Início</a></li>
                    <li><a th:href="@{/nova-duvida}">Nova Dúvida</a></li>
                    <li><a th:href="@{/listagem}">Listar Usuarios</a></li>
                    <li><a th:href="@{/usuario}">Registrar</a></li>
                    <li><a th:href="@{/editar}">Editar Conta</a></li>
                    <li><a th:href="@{/excluir}">Excluir Conta</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container main-editar">
        <div class="card-editar">
            <h2>Editar Conta</h2>
            
            <form th:action="@{/editar}" method="post">
                <div class="form-group">
                    <label>Nome de usuário:</label>
                    <input type="text" name="nome" required>
                </div>

                <div class="form-group">
                    <label>Sua senha atual:</label>
                    <input type="password" name="novaSenha" required>
                </div>

                <div class="form-group">
                    <label>Confirmar senha:</label>
                    <input type="password" name="confirmarSenha" required>
                </div>

                <div th:if="${erro}" class="erro-mensagem" th:text="${erro}"></div>

                <button type="submit" class="btn-editar">Verificar Identidade</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <p>GameHelp Forum · projeto acadêmico</p>
        </div>
    </footer>
</body>
</html>
