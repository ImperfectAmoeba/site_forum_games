<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir Conta - GameHelp Forum</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Estilos adicionais específicos para a página de exclusão */
        .main-excluir {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            margin: 2rem auto;
        }

        .card-excluir {
            background: white;
            border-radius: 28px;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(23, 55, 90, 0.15);
            border: 1px solid #d5e0f0;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .excluir-header {
            margin-bottom: 2rem;
        }

        .excluir-header h2 {
            font-size: 2rem;
            color: #1e2b41;
            margin-bottom: 0.5rem;
        }

        .excluir-header p {
            color: #5b687c;
            font-size: 1rem;
        }

        .aviso-exclusao {
            background: #fff3cd;
            border-left: 8px solid #e6b800;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin: 1.5rem 0;
            text-align: left;
        }

        .aviso-exclusao p {
            color: #856404;
            font-weight: 500;
            margin: 0;
        }

        .aviso-exclusao small {
            color: #856404;
            font-size: 0.85rem;
        }

        .form-excluir .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-excluir label {
            display: block;
            font-weight: 600;
            color: #1e2b41;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .form-excluir input {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid #dde3ed;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.2s;
            background-color: #fbfdff;
        }

        .form-excluir input:focus {
            outline: none;
            border-color: #dc3545;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.15);
        }

        .btn-excluir {
            width: 100%;
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 1rem;
            box-shadow: 0 5px 12px rgba(220, 53, 69, 0.3);
        }

        .btn-excluir:hover {
            background-color: #c82333;
            transform: scale(1.02);
        }

        .btn-cancelar {
            display: inline-block;
            width: 100%;
            background-color: #e9eef5;
            color: #1e2b41;
            text-align: center;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: 0.2s;
            border: 2px solid transparent;
            text-decoration: none;
        }

        .btn-cancelar:hover {
            background-color: #d7e0ec;
            transform: scale(1.02);
            color: #1e2b41;
        }

        .erro-mensagem {
            background: #ffe6e6;
            color: #a13030;
            padding: 0.8rem;
            border-radius: 50px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-container">
            <h1 class="logo"><a th:href="@{/}">GameHelp Forum</a></h1>
            <nav>
                <ul class="nav-links">
                    <li><a th:href="@{/}">Início</a></li>
                    <li><a th:href="@{/nova-duvida}">Nova Dúvida</a></li>
                    <li><a th:href="@{/listagem}">Listar Usuarios</a></li>
                    <li><a th:href="@{/usuario}">Registrar</a></li>
                    <li><a th:href="@{/editar}">Editar Conta</a></li>
                    <li><a th:href="@{/excluir}">Excluir Conta</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container main-excluir">
        <div class="card-excluir">
            <div class="excluir-header">
                <h2>Excluir Conta</h2>
                <p>Esta ação é permanente e irreversível</p>
            </div>

            <div class="aviso-exclusao">
                <p>ATENÇÃO: Esta ação é irreversível</p>
            </div>

            <form class="form-excluir" th:action="@{/excluir}" method="post">
                <div class="form-group">
                    <label for="nome">Apelido</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome de usuário" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>

                <div th:if="${erro}" class="erro-mensagem" th:text="${erro}"></div>

                <button type="submit" class="btn-excluir">Confirmar Exclusão</button>
                <a th:href="@{/}" class="btn-cancelar">Cancelar</a>
            </form>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <p>GameHelp Forum · projeto acadêmico</p>
            <p>Programação para Servidores II</p>
        </div>
    </footer>
</body>
</html>
